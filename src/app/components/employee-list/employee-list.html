<h3 class="text-center">Employee List Using NgRx</h3>

<div class="border border-3 rounded-3 p3">
  <table class="table table-bordered">
    <tbody>
      @for (emp of employees$ | async; track $index) {
      <tr>
        <td>{{emp.id}}</td>
        <td>{{emp.firstName}}</td>
        <td>{{emp.lastName}}</td>
        <td>{{emp.gender}}</td>
        <td>{{emp.sal}}</td>
        <td><button class="btn btn-danger" (click)="deleteEmp(emp.id)">Delete</button></td>
      </tr>
      }
    </tbody>
  </table>
</div>
